name: validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  metadata:
    runs-on: apollo-libggml-cuda-bin
    timeout-minutes: 20
    container:
      image: archlinux:base-devel
      options: --network host
    steps:
      - uses: actions/checkout@v4

      - name: Install validation dependencies
        run: pacman -Syu --noconfirm diffutils

      - name: Validate packaging metadata
        run: ./scripts/validate-repo.sh
